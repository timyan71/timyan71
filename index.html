<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR! - Story 1 : Study Area</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-border: #4a5d23;
            --pixel-bg: #f5f7d1;
            --pixel-accent: #a8d56f;
            --pixel-text: #2d4a22;
            --dialogue-bg: #fffef0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: crisp-edges;
            image-rendering: pixelated;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #5a6e3e;  /* 底色備援 */
            font-family: 'VT323', monospace;
            touch-action: manipulation;
        }

        /* 背景圖片強制使用 studyarea.png */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('studyarea.png') no-repeat center center;
            background-size: cover;
            z-index: -1;
        }

        /* 確保圖片載入失敗時仍有深色備援，不影響體驗 */
        .background::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #6b7f4a;
            z-index: -2;
        }

        /* 角色容器 */
        .character-container {
            position: absolute;
            bottom: 22vh;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 5%;
            pointer-events: none;
            z-index: 5;
        }

        .character {
            width: 40vw;
            max-width: 260px;
            height: auto;
            transition: all 0.2s steps(3);
            filter: brightness(0.5) grayscale(0.5);
            transform: scale(0.85);
            opacity: 0.7;
        }

        .character.active {
            filter: brightness(1) grayscale(0);
            transform: scale(1.08);
            opacity: 1;
            z-index: 10;
        }

        /* 像素對話框 */
        .pixel-dialogue {
            position: absolute;
            bottom: 25px;
            left: 5%;
            width: 90%;
            min-height: 140px;
            background: var(--dialogue-bg);
            border: 5px solid var(--pixel-border);
            box-shadow: 0 5px 0 -1px var(--pixel-border), 0 -5px 0 -1px var(--pixel-border), 5px 0 0 -1px var(--pixel-border), -5px 0 0 -1px var(--pixel-border);
            padding: 18px 20px 20px 20px;
            z-index: 20;
            cursor: pointer;
        }

        .name-tag {
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: var(--pixel-accent);
            padding: 4px 14px;
            border: 2px solid var(--pixel-border);
            position: absolute;
            top: -18px;
            left: 15px;
            letter-spacing: 1px;
        }

        .message {
            font-size: 26px;
            color: var(--pixel-text);
            line-height: 1.2;
            margin-top: 8px;
            word-break: break-word;
        }

        .next-arrow {
            position: absolute;
            right: 18px;
            bottom: 12px;
            font-size: 28px;
            color: var(--pixel-accent);
            animation: bounceArrow 0.5s steps(2) infinite;
            font-weight: bold;
            cursor: pointer;
        }

        @keyframes bounceArrow {
            0% { transform: translateX(0); }
            100% { transform: translateX(6px); }
        }

        /* 開始遊戲按鈕畫面 */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(245, 247, 209, 0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 100;
        }

        .mission-box {
            border: 6px solid var(--pixel-border);
            background: white;
            padding: 30px 25px;
            width: 85%;
            max-width: 400px;
            text-align: center;
            box-shadow: 8px 8px 0 var(--pixel-border);
        }

        .mission-title {
            font-size: 34px;
            color: #d32f2f;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .mission-text {
            font-size: 24px;
            color: var(--pixel-text);
            line-height: 1.3;
            margin-bottom: 30px;
        }

        .btn-start {
            font-family: 'VT323', monospace;
            font-size: 32px;
            background: var(--pixel-accent);
            color: white;
            border: 3px solid var(--pixel-border);
            padding: 12px 35px;
            cursor: pointer;
            box-shadow: 5px 5px 0 var(--pixel-border);
            transition: 0.05s linear;
            font-weight: bold;
        }
        .btn-start:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0 var(--pixel-border);
        }

        /* 隱藏對話框的狀態 */
        .hidden-dialogue {
            display: none;
        }
    </style>
</head>
<body>

    <!-- 背景圖片 studyarea.png (強制使用本地圖片) -->
    <div class="background"></div>

    <!-- 左右角色區 -->
    <div class="character-container">
        <img id="runninghorse" class="character" src="跑馬01-bad.png" alt="Running Horse">
        <img id="bookworm" class="character" src="書蟲01-norm.png" alt="Bookworm">
    </div>

    <!-- 對話框 (點擊箭頭或點擊對話框區域觸發下一句) -->
    <div class="pixel-dialogue" id="dialogue-box">
        <div class="name-tag" id="speaker-name">跑馬</div>
        <div class="message" id="message-text">Norrrrr——(lying on the ground painfully)T^T</div>
        <div class="next-arrow" id="next-arrow">→</div>
    </div>

    <!-- 故事結束後顯示「Start Matching Game」按鈕 -->
    <div id="start-screen">
        <div class="mission-box">
            <h1 class="mission-title">📖 LET'S GO!</h1>
            <p class="mission-text">Find the hidden clues<br>with your camera!</p>
            <button class="btn-start" id="start-matching-btn">▶ START MATCHING GAME</button>
        </div>
    </div>

    <script>
        // 定義故事對話流程 (完全依照需求)
        const storySteps = [
            {
                speaker: "跑馬",
                text: "Norrrrr——(lying on the ground painfully)T^T",
                activeCharacter: "runninghorse",   // 左側角色高亮
                characterImg: "跑馬01-bad.png"
            },
            {
                speaker: "書蟲",
                text: "Hi— where do the noise comes from?? I cannot see anyone!",
                activeCharacter: "bookworm",        // 右側角色高亮
                characterImg: "書蟲01-norm.png"
            },
            {
                speaker: "書蟲",
                text: "I think I should start searching!",
                activeCharacter: "bookworm",
                characterImg: "書蟲01-norm.png"
            }
        ];

        let currentStepIndex = 0;
        let storyEnded = false;

        // DOM 元素
        const dialogueBox = document.getElementById('dialogue-box');
        const speakerNameEl = document.getElementById('speaker-name');
        const messageTextEl = document.getElementById('message-text');
        const runninghorseImg = document.getElementById('runninghorse');
        const bookwormImg = document.getElementById('bookworm');
        const startScreen = document.getElementById('start-screen');
        const startMatchingBtn = document.getElementById('start-matching-btn');

        // 更新角色圖片 (確保使用正確圖片路徑)
        function updateCharacterImages(step) {
            // 先將兩個角色的 active class 移除
            runninghorseImg.classList.remove('active');
            bookwormImg.classList.remove('active');

            // 根據 step 高亮對應角色
            if (step.activeCharacter === 'runninghorse') {
                runninghorseImg.classList.add('active');
                if (runninghorseImg.src && !runninghorseImg.src.includes('跑馬01-bad.png')) {
                    runninghorseImg.src = '跑馬01-bad.png';
                }
            } else if (step.activeCharacter === 'bookworm') {
                bookwormImg.classList.add('active');
                if (bookwormImg.src && !bookwormImg.src.includes('書蟲01-norm.png')) {
                    bookwormImg.src = '書蟲01-norm.png';
                }
            }
        }

        // 載入角色圖片 (確保圖片存在，若無則顯示預設但無傷大雅)
        function preloadImages() {
            // 設定預設圖片路徑
            runninghorseImg.src = '跑馬01-bad.png';
            bookwormImg.src = '書蟲01-norm.png';
            // 加上錯誤處理：如果圖片無法載入，保持原樣，不影響功能
            runninghorseImg.onerror = () => { console.log("跑馬圖片載入失敗，請檢查路徑: 跑馬01-bad.png"); };
            bookwormImg.onerror = () => { console.log("書蟲圖片載入失敗，請檢查路徑: 書蟲01-norm.png"); };
        }

        // 確認背景圖 studyarea.png 是否可載入 (若無則顯示提示但不影響遊戲)
        function verifyBackgroundImage() {
            const bgDiv = document.querySelector('.background');
            const testImg = new Image();
            testImg.onerror = function() {
                console.warn("⚠️ studyarea.png 無法載入，請確認圖片是否在相同目錄下");
                // 保持原有背景樣式，背景會顯示棕色備援，但無傷大雅
            };
            testImg.onload = function() {
                console.log("✅ studyarea.png 背景載入成功");
            };
            testImg.src = 'studyarea.png';
        }

        // 更新對話框內容
        function updateDialogue() {
            if (currentStepIndex < storySteps.length) {
                const step = storySteps[currentStepIndex];
                speakerNameEl.textContent = step.speaker;
                messageTextEl.textContent = step.text;
                updateCharacterImages(step);
            } else {
                // 故事結束，隱藏對話框，顯示開始遊戲按鈕畫面
                storyEnded = true;
                dialogueBox.classList.add('hidden-dialogue');
                dialogueBox.style.display = 'none';
                startScreen.style.display = 'flex';
            }
        }

        // 前進到下一句對話 (由點擊觸發)
        function nextDialogue() {
            if (storyEnded) return;
            
            if (currentStepIndex < storySteps.length) {
                currentStepIndex++;
                updateDialogue();
            }
        }

        // 點擊對話框或箭頭觸發下一句
        function handleNextClick(event) {
            if (storyEnded) return;
            // 避免點擊按鈕時冒泡影響
            if (event.target === startMatchingBtn) return;
            nextDialogue();
        }

        // 跳轉到 matchinggame.html (與之前的遊戲連結)
        function goToMatchingGame() {
            window.location.href = 'matchinggame.html';
        }

        // 初始化
        function init() {
            preloadImages();
            verifyBackgroundImage();   // 檢查背景圖
            // 起始狀態：左側跑馬高亮 active
            runninghorseImg.classList.add('active');
            bookwormImg.classList.remove('active');
            // 綁定事件
            dialogueBox.addEventListener('click', handleNextClick);
            const arrowBtn = document.getElementById('next-arrow');
            if (arrowBtn) {
                arrowBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    nextDialogue();
                });
            }
            startMatchingBtn.addEventListener('click', goToMatchingGame);
            // 設定起始對話 (確保與 storySteps[0] 一致)
            speakerNameEl.textContent = storySteps[0].speaker;
            messageTextEl.textContent = storySteps[0].text;
            // 強制背景圖再次確保覆蓋 (style 內已確保)
            document.querySelector('.background').style.background = "url('studyarea.png') no-repeat center center";
            document.querySelector('.background').style.backgroundSize = "cover";
        }

        init();
    </script>
</body>
</html>
