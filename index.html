<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR! - STUDY MISSION</title>
    <style>
        /* 像素風格字體：Press Start 2P 搭配 VT323 提升復古遊戲感 */
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            font-family: 'Press Start 2P', 'VT323', monospace;
            background: #e2f6d4;  /* 1. 嫩葉淺綠色作為背景主色調 (最多) */
            color: #4b8f7d;       /* 4. 深海松葉綠作為主要文字色 (最少) */
            -webkit-tap-highlight-color: transparent;
        }

        /* 清新綠色背景層次：淺綠基底，加入柔和草綠的網格裝飾 */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #e2f6d4;  /* 淺綠基底 */
            z-index: -2;
        }
        /* 輕度像素網格：使用柔和草綠 #b6e4a8 做點綴 (用量第二多) */
        .cyber-bg::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(to right, #b6e4a8 1px, transparent 1px),
                linear-gradient(to bottom, #b6e4a8 1px, transparent 1px);
            background-size: 24px 24px;
            opacity: 0.35;
            pointer-events: none;
            z-index: -1;
        }

        /* 能量波動: 使用薄荷綠 #74c99f 為主 (用量第三) */
        .energy-wave {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(116, 201, 159, 0.25) 0%, transparent 70%);
            animation: energyPulse 4s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        /* 掃描線：深海松葉綠，低調像素感 */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(75, 143, 125, 0.06) 0px, rgba(75, 143, 125, 0.06) 2px, transparent 2px, transparent 8px);
            pointer-events: none;
            z-index: 10;
        }

        .game-container {
            width: 100vw;
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 15px;
            padding-bottom: 60px;
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        /* 像素風格邊框 */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 18px;
            background: #e2f6d4;  /* 淺綠基底 */
            border: 4px solid #74c99f; /* 薄荷綠邊框 */
            margin-bottom: 18px;
            position: relative;
            flex-shrink: 0;
            box-shadow: inset 0 0 0 1px #4b8f7d, 4px 4px 0 #b6e4a8;
        }
        .status-bar::before {
            content: 'MISSION';
            position: absolute;
            top: -12px;
            left: 12px;
            background: #74c99f;  /* 薄荷綠 */
            padding: 0 8px;
            color: #e2f6d4;
            font-size: 10px;
            font-family: 'Press Start 2P', monospace;
            letter-spacing: 1px;
            border: 2px solid #4b8f7d;
        }
        .status-bar .level-info span {
            color: #4b8f7d;
        }

        .energy-container {
            margin-bottom: 18px;
            flex-shrink: 0;
        }
        .energy-label {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            margin-bottom: 6px;
            color: #4b8f7d;
            font-family: 'Press Start 2P', monospace;
            letter-spacing: 0.5px;
        }
        .energy-bar-bg {
            width: 100%;
            height: 24px;
            background: #e2f6d4;
            border: 3px solid #74c99f;
            box-shadow: inset 0 0 0 1px #4b8f7d;
            overflow: hidden;
        }
        .energy-fill {
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(90deg, #74c99f, #b6e4a8, #74c99f);
            transition: width 0.2s ease;
        }

        .location-header {
            text-align: center;
            padding: 14px;
            background: #e2f6d4;
            border: 4px solid #74c99f;
            margin-bottom: 18px;
            flex-shrink: 0;
            box-shadow: inset 0 0 0 1px #4b8f7d;
        }
        .location-name {
            font-size: 18px;
            letter-spacing: 2px;
            color: #4b8f7d;
            text-shadow: 2px 2px 0 #b6e4a8;
        }
        .level-badge {
            font-size: 11px;
            color: #74c99f;
            margin-top: 8px;
            font-family: 'Press Start 2P', monospace;
        }

        .timer {
            font-size: 38px;
            font-weight: 900;
            font-family: 'Press Start 2P', monospace;
            color: #4b8f7d;
            text-shadow: 3px 3px 0 #b6e4a8;
            text-align: center;
            margin-bottom: 15px;
            flex-shrink: 0;
            letter-spacing: 3px;
        }

        .area-card {
            background: #e2f6d4;
            border: 4px solid #74c99f;
            padding: 16px;
            margin-bottom: 18px;
            flex-shrink: 0;
            box-shadow: inset 0 0 0 1px #4b8f7d, 4px 4px 0 #b6e4a8;
        }
        .section-title {
            color: #4b8f7d;
            margin-bottom: 12px;
            font-size: 13px;
            letter-spacing: 1.5px;
            font-family: 'Press Start 2P', monospace;
            text-shadow: 1px 1px 0 #b6e4a8;
        }
        .image-container {
            width: 100%;
            aspect-ratio: 4/3;
            background: #e2f6d4;
            border: 3px solid #74c99f;
            overflow: hidden;
            margin-bottom: 12px;
            image-rendering: auto;  /* 圖片保持平滑自然 */
        }
        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            image-rendering: auto;
        }
        .placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #74c99f;
            background: #e2f6d4;
            font-family: monospace;
        }
        .placeholder i { font-size: 38px; color: #b6e4a8; opacity: 0.8; }

        .similarity-meter {
            margin-top: 12px;
            padding: 12px;
            background: #e2f6d4;
            border: 3px solid #74c99f;
        }
        .meter-label {
            color: #4b8f7d;
            margin-bottom: 8px;
            font-size: 10px;
        }
        .meter-bar {
            width: 100%;
            height: 16px;
            background: #e2f6d4;
            border: 2px solid #74c99f;
            overflow: hidden;
            margin: 5px 0;
        }
        .meter-fill {
            height: 100%;
            transition: width 0.15s ease;
        }
        .meter-fill.high { background: #74c99f; box-shadow: inset 0 0 4px #4b8f7d; }
        .meter-fill.medium { background: #b6e4a8; }
        .meter-fill.low { background: #4b8f7d; }

        /* 像素風格按鈕：以薄荷綠和柔和草綠為主 */
        .btn {
            width: 100%;
            padding: 14px;
            font-size: 13px;
            font-family: 'Press Start 2P', monospace;
            border: 3px solid #4b8f7d;
            background: #74c99f;
            color: #e2f6d4;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            transition: all 0.05s linear;
            margin-top: 10px;
            box-shadow: inset 0 0 0 1px #e2f6d4, 3px 3px 0 #b6e4a8;
            -webkit-appearance: none;
            text-shadow: 1px 1px 0 #4b8f7d;
        }
        .btn:active {
            background: #b6e4a8;
            color: #4b8f7d;
            transform: translate(2px, 2px);
            box-shadow: inset 0 0 0 1px #e2f6d4, 1px 1px 0 #4b8f7d;
        }
        .btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
            filter: grayscale(0.1);
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        #video.visible { display: block; }

        .photo-actions {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .photo-actions .btn {
            flex: 1;
            margin-top: 0;
        }

        .back-button {
            position: fixed;
            top: 15px;
            left: 15px;
            z-index: 100;
        }
        .back-button a {
            color: #e2f6d4;
            text-decoration: none;
            border: 3px solid #4b8f7d;
            padding: 8px 12px;
            font-size: 11px;
            background: #74c99f;
            font-family: 'Press Start 2P', monospace;
            box-shadow: 2px 2px 0 #b6e4a8;
            display: inline-block;
        }
        .back-button a:active {
            transform: translate(2px,2px);
            box-shadow: none;
        }

        .bottom-buttons {
            margin-top: 10px;
            margin-bottom: 30px;
            flex-shrink: 0;
        }

        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #74c99f;
            border: 4px solid #4b8f7d;
            padding: 18px 24px;
            font-size: 13px;
            z-index: 1000;
            display: none;
            text-align: center;
            white-space: nowrap;
            font-family: 'Press Start 2P', monospace;
            color: #e2f6d4;
            box-shadow: 8px 8px 0 #b6e4a8;
        }
        .toast.show { display: block; animation: fadeIn 0.2s ease; }

        @keyframes energyPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.02); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
            to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        }
        .shake { animation: shake 0.2s steps(4); }
        @keyframes shake {
            0%,100%{transform:translateX(0)} 25%{transform:translateX(-4px)} 75%{transform:translateX(4px)}
        }

        #cameraStatus.online { color: #4b8f7d; font-weight: bold; }
        #cameraStatus.offline { color: #74c99f; background: #e2f6d4; display: inline-block; padding: 2px 6px; }

        /* 滾動條風格 */
        ::-webkit-scrollbar {
            width: 12px;
            background: #e2f6d4;
        }
        ::-webkit-scrollbar-thumb {
            background: #74c99f;
            border: 2px solid #4b8f7d;
        }
    </style>
</head>
<body>
    <div class="cyber-bg"></div>
    <div class="energy-wave"></div>
    <div class="scan-line"></div>

    <div class="back-button"><a href="index.html">← EXIT</a></div>

    <div class="game-container">
        <div class="status-bar">
            <div class="level-info">
                <span id="currentLocation">STUDY AREA</span>
            </div>
            <div class="timer" id="timer">--</div>
        </div>

        <div class="energy-container">
            <div class="energy-label"><span>⚡ NEGATIVE ENERGY</span><span id="energyPercent">40%</span></div>
            <div class="energy-bar-bg"><div class="energy-fill" id="energyFill" style="width: 40%"></div></div>
        </div>

        <div class="location-header" id="locationHeader" style="display: none;">
            <div class="location-name">📖 STUDY AREA</div>
            <div class="level-badge" id="levelInfo">LEVEL 1/5 | TIME: 5:00</div>
        </div>

        <div class="area-card" id="challengeArea" style="display: none;">
            <div class="section-title">🎯 TARGET PHOTO</div>
            <div class="image-container" id="targetContainer">
                <img id="targetImg" src="" alt="TARGET" style="width:100%; height:100%; object-fit:cover; display:none;">
                <div class="placeholder" id="targetPlaceholder"><i>📸</i><p>LOADING CHALLENGE...</p></div>
            </div>
        </div>

        <div class="similarity-meter" id="similarityMeter" style="display:none">
            <div class="meter-label">MATCH RATE</div>
            <div class="meter-bar"><div class="meter-fill" id="similarityFill" style="width:0%"></div></div>
            <div id="similarityText" style="text-align:center; margin-top:5px; color:#4b8f7d; font-size:12px">0%</div>
        </div>

        <div class="area-card" id="cameraArea" style="display: none;">
            <div class="section-title">📷 YOUR CAMERA</div>
            <div class="image-container">
                <video id="video" autoplay playsinline></video>
                <canvas id="canvas" style="display:none"></canvas>
                <div class="placeholder" id="cameraPlaceholder"><i>📷</i><p>CAMERA OFFLINE</p></div>
            </div>
            <div class="photo-actions">
                <button class="btn" id="takePhotoBtn" onclick="takePhoto()" disabled>📸 CAPTURE</button>
                <button class="btn" id="submitBtn" onclick="submitMatch()" disabled>⬆ SUBMIT</button>
            </div>
            <div id="cameraStatus" style="text-align:center; margin-top:12px; font-size:10px; font-family:monospace;">OFFLINE</div>
        </div>

        <div class="bottom-buttons">
            <button class="btn" id="nextLevelBtn" onclick="nextLevel()" style="display:none">⏭ NEXT LEVEL</button>
        </div>
        
        <div class="area-card" id="studyIntroCard">
            <div class="section-title">📍 STUDY AREA</div>
            <div class="image-container">
                <img id="studyImage" src="https://i.postimg.cc/hJ3vVwzL/IMG-9843.jpg" alt="STUDY AREA">
            </div>
            <button class="btn" id="startMatchingBtn" onclick="startMatching()">▶ START MATCHING</button>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // ========== 第四關卡設定（完全保留原始遊戲邏輯，僅色彩主題變更）==========
        const LEVEL_IMAGES = [
            "https://i.postimg.cc/w3WzMJNS/IMG-9822.jpg",
            "https://i.postimg.cc/N20wbG3D/IMG-9824.jpg",
            "https://i.postimg.cc/DWqFwMQG/IMG-9827.jpg",
            "https://i.postimg.cc/hhMDm6k1/IMG-9829.jpg",
            "https://i.postimg.cc/9RJ645D7/IMG-9846.jpg"
        ];
        
        const LEVEL_TIMES = [300, 240, 180, 120, 60];
        const MAX_REDUCTION_PER_LEVEL = 4;
        
        function getReductionBySimilarity(similarity) {
            if (similarity >= 95) return 4.0;
            if (similarity >= 90) return 3.5;
            if (similarity >= 85) return 3.0;
            if (similarity >= 80) return 2.5;
            if (similarity >= 75) return 2.0;
            if (similarity >= 70) return 1.5;
            if (similarity >= 65) return 1.0;
            if (similarity >= 60) return 0.5;
            return 0;
        }
        
        let gameState = {
            currentLevel: 1,
            energy: 40,
            timer: 0,
            timerInterval: null,
            camera: null,
            cameraActive: false,
            currentPhoto: null,
            currentSimilarity: 0,
            isSubmitted: false,
            levelCompleted: false,
            gameActive: false
        };
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const targetImg = document.getElementById('targetImg');
        const targetPlaceholder = document.getElementById('targetPlaceholder');
        const similarityMeter = document.getElementById('similarityMeter');
        const similarityFill = document.getElementById('similarityFill');
        const similarityText = document.getElementById('similarityText');
        const takePhotoBtn = document.getElementById('takePhotoBtn');
        const submitBtn = document.getElementById('submitBtn');
        const nextLevelBtn = document.getElementById('nextLevelBtn');
        const timerDisplay = document.getElementById('timer');
        const levelInfo = document.getElementById('levelInfo');
        const energyFill = document.getElementById('energyFill');
        const energyPercent = document.getElementById('energyPercent');
        const studyIntroCard = document.getElementById('studyIntroCard');
        const locationHeader = document.getElementById('locationHeader');
        const challengeArea = document.getElementById('challengeArea');
        const cameraArea = document.getElementById('cameraArea');
        
        async function startMatching() {
            studyIntroCard.style.display = 'none';
            locationHeader.style.display = 'block';
            challengeArea.style.display = 'block';
            cameraArea.style.display = 'block';
            await initCamera();
            startLevel();
        }
        
        async function initCamera() {
            try {
                const constraints = { video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: 'environment' } };
                gameState.camera = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = gameState.camera;
                await new Promise(resolve => { video.onloadedmetadata = () => { video.play(); resolve(); }; });
                video.classList.add('visible');
                document.getElementById('cameraPlaceholder').style.display = 'none';
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                gameState.cameraActive = true;
                const camStatus = document.getElementById('cameraStatus');
                camStatus.textContent = 'ONLINE';
                camStatus.style.color = '#4b8f7d';
                takePhotoBtn.disabled = false;
                showToast("✅ CAMERA READY");
            } catch (error) {
                showToast("❌ CAMERA ACCESS DENIED", "error");
                document.getElementById('cameraStatus').textContent = 'OFFLINE';
                gameState.cameraActive = false;
            }
        }
        
        function startLevel() {
            const levelIdx = gameState.currentLevel - 1;
            const timeLimit = LEVEL_TIMES[levelIdx];
            const targetUrl = LEVEL_IMAGES[levelIdx];
            targetImg.src = targetUrl;
            targetImg.style.display = 'block';
            targetPlaceholder.style.display = 'none';
            levelInfo.innerHTML = `LEVEL ${gameState.currentLevel}/5 | TIME: ${Math.floor(timeLimit/60)}:${(timeLimit%60).toString().padStart(2,'0')}`;
            gameState.isSubmitted = false;
            gameState.levelCompleted = false;
            gameState.currentPhoto = null;
            gameState.currentSimilarity = 0;
            similarityMeter.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.style.display = 'block';
            nextLevelBtn.style.display = 'none';
            takePhotoBtn.disabled = false;
            takePhotoBtn.textContent = "📸 CAPTURE";
            startTimer(timeLimit);
        }
        
        function startTimer(seconds) {
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
            gameState.timer = seconds;
            updateTimerDisplay();
            gameState.timerInterval = setInterval(() => {
                if (gameState.timer <= 0) {
                    clearInterval(gameState.timerInterval);
                    if (!gameState.isSubmitted && !gameState.levelCompleted) {
                        handleTimeout();
                    }
                } else {
                    gameState.timer--;
                    updateTimerDisplay();
                }
            }, 1000);
        }
        
        function updateTimerDisplay() {
            const mins = Math.floor(gameState.timer / 60);
            const secs = gameState.timer % 60;
            timerDisplay.textContent = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            if (gameState.timer <= 10) timerDisplay.style.color = "#74c99f";
            else timerDisplay.style.color = "#4b8f7d";
        }
        
        function handleTimeout() {
            showToast("⏰ TIME'S UP! LEVEL FAILED", "error");
            gameState.levelCompleted = true;
            takePhotoBtn.disabled = true;
            submitBtn.disabled = true;
            nextLevelBtn.style.display = 'block';
            nextLevelBtn.textContent = "🔄 RETRY LEVEL";
        }
        
        function takePhoto() {
            if (!gameState.cameraActive) { showToast("CAMERA OFFLINE", "error"); return; }
            if (gameState.isSubmitted) { showToast("LEVEL ALREADY COMPLETED", "warning"); return; }
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            gameState.currentPhoto = canvas.toDataURL('image/jpeg', 0.95);
            takePhotoBtn.textContent = "📸 RETRY";
            showToast("📸 PHOTO TAKEN! CALCULATING SIMILARITY...");
            calculateSimilarity();
        }
        
        function calculateSimilarity() {
            if (gameState.isSubmitted) return;
            const baseSimilarity = 40 + Math.random() * 50;
            const attemptBonus = Math.min(15, Math.floor(Math.random() * 20));
            let similarity = Math.min(98, baseSimilarity + attemptBonus);
            similarity = Math.floor(similarity);
            gameState.currentSimilarity = similarity;
            displaySimilarity(similarity);
            submitBtn.disabled = false;
            if (similarity >= 90) showToast(`✅ EXCELLENT! ${similarity}% - READY TO SUBMIT`);
            else if (similarity >= 70) showToast(`👍 GOOD! ${similarity}% - READY TO SUBMIT`);
            else if (similarity >= 50) showToast(`📸 ${similarity}% - CAN SUBMIT BUT LOW REDUCTION`);
            else showToast(`⚠️ ${similarity}% - SUBMIT WILL REDUCE LITTLE ENERGY`);
        }
        
        function displaySimilarity(percent) {
            similarityMeter.style.display = 'block';
            similarityFill.style.width = percent + '%';
            similarityText.textContent = percent + '%';
            if (percent >= 80) similarityFill.className = 'meter-fill high';
            else if (percent >= 50) similarityFill.className = 'meter-fill medium';
            else similarityFill.className = 'meter-fill low';
        }
        
        function submitMatch() {
            if (gameState.isSubmitted) return;
            let reduction = getReductionBySimilarity(gameState.currentSimilarity);
            const timeBonus = Math.min(1.5, Math.floor(gameState.timer / 120));
            let totalReduction = reduction + timeBonus;
            totalReduction = Math.min(MAX_REDUCTION_PER_LEVEL, totalReduction);
            totalReduction = Math.min(gameState.energy, totalReduction);
            gameState.energy = Math.max(0, gameState.energy - totalReduction);
            updateEnergyBar();
            let gradeText = "";
            let messageType = "info";
            if (gameState.currentSimilarity >= 90) { gradeText = "✨ PERFECT MATCH! ✨"; messageType = "success"; }
            else if (gameState.currentSimilarity >= 70) { gradeText = "🌟 GOOD MATCH! 🌟"; messageType = "success"; }
            else if (gameState.currentSimilarity >= 50) { gradeText = "✓ ACCEPTABLE MATCH"; messageType = "info"; }
            else { gradeText = "⚠️ POOR MATCH"; messageType = "warning"; }
            if (totalReduction > 0) showToast(`${gradeText} | -${totalReduction.toFixed(1)}% NEGATIVE ENERGY`, messageType);
            else showToast(`${gradeText} | NO ENERGY REDUCED`, "warning");
            gameState.isSubmitted = true;
            gameState.levelCompleted = true;
            takePhotoBtn.disabled = true;
            submitBtn.disabled = true;
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
            if (gameState.currentLevel === 5) {
                if (gameState.energy <= 0) showToast("🏆 ALL LEVELS CLEARED! NEGATIVE ENERGY ELIMINATED!");
                nextLevelBtn.textContent = "🏆 FINISH";
                nextLevelBtn.style.display = 'block';
            } else {
                nextLevelBtn.style.display = 'block';
                nextLevelBtn.textContent = "⏭ NEXT LEVEL";
            }
        }
        
        function updateEnergyBar() {
            const val = Math.max(0, gameState.energy);
            energyFill.style.width = val + '%';
            energyPercent.textContent = Math.floor(val) + '%';
            if (val <= 30) energyFill.style.background = "repeating-linear-gradient(90deg, #74c99f, #b6e4a8)";
            if (val <= 10) energyFill.style.background = "#74c99f";
        }
        
        function nextLevel() {
            if (gameState.currentLevel < 5) {
                gameState.currentLevel++;
                gameState.isSubmitted = false;
                gameState.levelCompleted = false;
                gameState.currentPhoto = null;
                gameState.currentSimilarity = 0;
                similarityMeter.style.display = 'none';
                submitBtn.disabled = true;
                nextLevelBtn.style.display = 'none';
                takePhotoBtn.disabled = false;
                takePhotoBtn.textContent = "📸 CAPTURE";
                startLevel();
            } else {
                showToast("🎉 CONGRATULATIONS! MISSION COMPLETE!");
                setTimeout(() => { window.location.href = 'index.html'; }, 2000);
            }
        }
        
        function showToast(msg, type = "info") {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast show';
            if (type === "error") toast.style.background = "#4b8f7d";
            else if (type === "warning") toast.style.background = "#74c99f";
            else toast.style.background = "#b6e4a8";
            toast.style.borderColor = "#4b8f7d";
            toast.style.color = "#e2f6d4";
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
        
        window.addEventListener('beforeunload', () => {
            if (gameState.camera) gameState.camera.getTracks().forEach(t => t.stop());
            if (gameState.timerInterval) clearInterval(gameState.timerInterval);
        });
    </script>
</body>
</html>
