<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR! - 故事對話</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-border: #4a5d23;
            --pixel-bg: #f5f7d1;
            --pixel-accent: #8bc34a;
            --pixel-text: #2d4a22;
            --dialogue-bg: #fffef0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -webkit-tap-highlight-color: transparent;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--pixel-bg);
            font-family: 'VT323', monospace;
            touch-action: manipulation;
        }

        /* 背景：study area.png */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('study area.png');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            z-index: -2;
        }
        
        /* 備援背景圖（如果本地圖片找不到） */
        .background::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.postimg.cc/mD8p95Yf/3ktyF11d.jpg');
            background-size: cover;
            background-position: center center;
            background-repeat: no-repeat;
            opacity: 0;
            z-index: -1;
            pointer-events: none;
        }

        /* 角色容器 */
        .character-container {
            position: absolute;
            bottom: 25vh;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 5%;
            pointer-events: none;
            z-index: 5;
        }

        .character {
            width: 45vw;
            max-width: 280px;
            height: auto;
            transition: all 0.2s steps(3);
            filter: brightness(0.55) grayscale(0.5);
            transform: scale(0.85);
            opacity: 0.7;
        }

        .character.active {
            filter: brightness(1) grayscale(0);
            transform: scale(1.05);
            opacity: 1;
            z-index: 10;
        }

        /* 對話框 - RPG風格 */
        .pixel-dialogue {
            position: absolute;
            bottom: 20px;
            left: 5%;
            width: 90%;
            min-height: 140px;
            background: var(--dialogue-bg);
            border: 5px solid var(--pixel-border);
            box-shadow: 0 6px 0 -2px var(--pixel-border), 0 -6px 0 -2px var(--pixel-border), 6px 0 0 -2px var(--pixel-border), -6px 0 0 -2px var(--pixel-border);
            padding: 15px 20px;
            z-index: 20;
            cursor: pointer;
        }

        .name-tag {
            font-size: 22px;
            color: white;
            background: var(--pixel-accent);
            display: inline-block;
            padding: 4px 16px;
            border: 2px solid var(--pixel-border);
            position: absolute;
            top: -20px;
            left: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .message {
            font-size: 26px;
            color: var(--pixel-text);
            line-height: 1.25;
            margin-top: 12px;
            margin-bottom: 20px;
            word-break: break-word;
            white-space: pre-line;
        }

        /* 右側箭頭按鈕 */
        .next-arrow {
            position: absolute;
            right: 18px;
            bottom: 12px;
            font-size: 32px;
            color: var(--pixel-accent);
            background: none;
            border: none;
            cursor: pointer;
            font-family: monospace;
            font-weight: bold;
            animation: bounce 0.5s steps(2) infinite;
            transition: transform 0.05s linear;
            padding: 5px 10px;
        }
        .next-arrow:active {
            transform: scale(0.9);
        }

        @keyframes bounce {
            0% { transform: translateX(0); }
            100% { transform: translateX(6px); }
        }

        /* 總結畫面 */
        #summary-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            z-index: 100;
            backdrop-filter: blur(2px);
        }

        .mission-box {
            border: 6px solid var(--pixel-border);
            background: var(--pixel-bg);
            padding: 30px 25px;
            width: 85%;
            max-width: 500px;
            text-align: center;
            box-shadow: 8px 8px 0 var(--pixel-border);
        }

        .mission-title {
            font-size: 36px;
            color: #d32f2f;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .mission-text {
            font-size: 24px;
            color: var(--pixel-text);
            line-height: 1.4;
            margin-bottom: 30px;
        }
        
        .btn-start {
            font-family: 'VT323', monospace;
            font-size: 32px;
            background: var(--pixel-accent);
            color: white;
            border: 3px solid var(--pixel-border);
            padding: 10px 40px;
            cursor: pointer;
            box-shadow: 5px 5px 0 var(--pixel-border);
            transition: all 0.05s linear;
        }
        .btn-start:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0 var(--pixel-border);
        }

        /* 手機觸控最佳化 */
        @media (max-width: 600px) {
            .message { font-size: 20px; }
            .name-tag { font-size: 18px; top: -18px; }
            .character { max-width: 200px; }
            .mission-text { font-size: 18px; }
            .mission-title { font-size: 28px; }
            .btn-start { font-size: 26px; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="character-container">
        <!-- 左側：跑馬 / 右側：書蟲 -->
        <img id="runningHorse" class="character" src="跑馬01-bad.png" alt="跑馬">
        <img id="bookworm" class="character" src="書蟲01-norm.png" alt="書蟲">
    </div>

    <div class="pixel-dialogue" id="dialogue-box">
        <div class="name-tag" id="speaker-name">跑馬</div>
        <div class="message" id="message-text">...</div>
        <button class="next-arrow" id="nextBtn">➔</button>
    </div>

    <div id="summary-screen">
        <div class="mission-box">
            <h1 class="mission-title">📖 任務總結</h1>
            <p class="mission-text" id="summary-text">
                跑馬覺得跑九分鐘耐力測試好辛苦 T^T<br>
                主角書蟲要幫佢跑九分鐘！
            </p>
            <button class="btn-start" id="startGameBtn">▶ 開始 MATCHING GAME</button>
        </div>
    </div>

    <script>
        // ========================
        // 故事流程（5個步驟，包含4段對話+總結自動觸發）
        // step0: 跑馬抱怨
        // step1: 跑馬介紹（特徵）
        // step2: 書蟲回應
        // step3: 自動顯示總結畫面（無需對話框）
        // ========================
        const storySteps = [
            {
                speaker: "跑馬",
                text: "覺得跑九分鐘耐力測試好辛苦 T^T",
                activeCharacter: "horse",      // 亮起左側跑馬
                showSummaryAfter: false
            },
            {
                speaker: "跑馬",
                text: "【介紹】跑馬 (Running Horse)\n特徵： 體育課惡夢，跑 9 分鐘耐力賽跑到快崩潰",
                activeCharacter: "horse",
                showSummaryAfter: false
            },
            {
                speaker: "主角 書蟲",
                text: "哈哈 幫佢跑九分鐘！",
                activeCharacter: "bookworm",
                showSummaryAfter: false
            }
        ];

        let currentStep = 0;
        let isSummaryVisible = false;

        // DOM 元素
        const dialogueBox = document.getElementById('dialogue-box');
        const speakerNameEl = document.getElementById('speaker-name');
        const messageTextEl = document.getElementById('message-text');
        const nextBtn = document.getElementById('nextBtn');
        const summaryScreen = document.getElementById('summary-screen');
        const horseImg = document.getElementById('runningHorse');
        const bookwormImg = document.getElementById('bookworm');
        const startGameBtn = document.getElementById('startGameBtn');

        // 更新角色高亮
        function updateCharacterHighlight(active) {
            // 預設兩個都變暗
            horseImg.classList.remove('active');
            bookwormImg.classList.remove('active');
            
            if (active === 'horse') {
                horseImg.classList.add('active');
            } else if (active === 'bookworm') {
                bookwormImg.classList.add('active');
            }
        }

        // 更新對話框內容
        function updateDialogue(stepIndex) {
            if (stepIndex < storySteps.length) {
                const step = storySteps[stepIndex];
                speakerNameEl.textContent = step.speaker;
                messageTextEl.textContent = step.text;
                updateCharacterHighlight(step.activeCharacter);
                // 確保對話框可見
                dialogueBox.style.display = 'block';
                isSummaryVisible = false;
            } else {
                // 所有對話結束 -> 顯示總結畫面
                showSummaryScreen();
            }
        }

        // 顯示總結畫面並隱藏對話框
        function showSummaryScreen() {
            dialogueBox.style.display = 'none';
            summaryScreen.style.display = 'flex';
            isSummaryVisible = true;
            // 將兩個角色都淡化（無高亮）
            horseImg.classList.remove('active');
            bookwormImg.classList.remove('active');
        }

        // 處理下一步 (點擊箭頭)
        function nextStep() {
            if (isSummaryVisible) {
                // 如果總結畫面已經顯示，點擊箭頭無效（箭頭已被隱藏）
                return;
            }
            
            if (currentStep < storySteps.length) {
                currentStep++;
                if (currentStep < storySteps.length) {
                    updateDialogue(currentStep);
                } else {
                    // 已經是最後一段對話結束，顯示總結畫面
                    showSummaryScreen();
                }
            } else {
                // 理論上不會進來，但安全起見
                showSummaryScreen();
            }
        }

        // 開始 Matching Game
        function startMatchingGame() {
            // 跳轉到 Matching Game 的 HTML 頁面（根據你的需求，這裡跳轉到原本的遊戲頁面）
            // 假設遊戲頁面檔案名稱為 index.html 或 camera_game.html，請依照實際修改
            window.location.href = 'index.html';  // 可改成遊戲頁面名稱
        }

        // 綁定箭頭按鈕事件
        nextBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            nextStep();
        });
        
        // 同時支援點擊對話框任意處觸發下一句（RPG 常見體驗）
        dialogueBox.addEventListener('click', function(e) {
            // 避免點擊到箭頭時觸發兩次（但箭頭已經有獨立事件）
            if (e.target === nextBtn || nextBtn.contains(e.target)) {
                return;
            }
            nextStep();
        });

        // 開始遊戲按鈕事件
        startGameBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            startMatchingGame();
        });

        // 初始化第一段對話
        function initStory() {
            currentStep = 0;
            updateDialogue(0);
            summaryScreen.style.display = 'none';
            dialogueBox.style.display = 'block';
            isSummaryVisible = false;
        }

        // 如果本地圖片載入失敗，使用 placeholder 確保顯示（不中斷體驗）
        function preloadImages() {
            const horseImgElement = document.getElementById('runningHorse');
            const wormImgElement = document.getElementById('bookworm');
            
            // 監測跑馬圖片載入錯誤，若無圖則保留透明效果但維持佈局
            horseImgElement.onerror = function() {
                this.style.backgroundColor = '#c0a080';
                this.style.objectFit = 'contain';
                this.alt = '跑馬';
            };
            wormImgElement.onerror = function() {
                this.style.backgroundColor = '#a8c9a0';
                this.style.objectFit = 'contain';
                this.alt = '書蟲';
            };
            
            // 背景圖若找不到也不影響主要體驗
            const bgDiv = document.querySelector('.background');
            const testBg = new Image();
            testBg.onerror = function() {
                // 如果 study area.png 不存在，保持備援色
                bgDiv.style.backgroundColor = '#d9e6b3';
            };
            testBg.src = 'study area.png';
        }

        // 執行初始化
        initStory();
        preloadImages();
        
        // 避免觸控時頁面縮放
        document.addEventListener('touchmove', function(e) {
            if (e.target.closest('.pixel-dialogue') || e.target.closest('#summary-screen')) {
                // 允許滾動但基本上沒滾動需求
            }
        }, { passive: false });
    </script>
</body>
</html>
