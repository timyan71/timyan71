<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Match AR! - 故事劇情</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-border: #4a5d23;
            --pixel-bg: #f5f7d1;
            --pixel-accent: #8bc34a;
            --pixel-accent-dark: #6a9e2e;
            --pixel-text: #2d4a22;
            --pixel-shadow: #3a4a1a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--pixel-bg);
            font-family: 'VT323', monospace;
            touch-action: manipulation;
        }

        /* 背景圖層 */
        .background-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://i.postimg.cc/mD8p95Yf/3ktyF11d.jpg') center center / cover no-repeat;
            filter: brightness(1.05);
            z-index: -2;
        }

        /* 像素風格的半透明遮罩，增加復古感 */
        .pixel-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(100, 80, 40, 0.08) 0px,
                rgba(100, 80, 40, 0.08) 2px,
                transparent 2px,
                transparent 8px
            );
            pointer-events: none;
            z-index: -1;
        }

        /* 角色雙人站位 */
        .character-container {
            position: absolute;
            bottom: 22vh;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 6%;
            pointer-events: none;
            z-index: 5;
        }

        .character {
            width: 38vw;
            max-width: 260px;
            height: auto;
            transition: all 0.2s steps(3);
            filter: brightness(0.65) grayscale(0.3) drop-shadow(2px 4px 0 rgba(0,0,0,0.2));
            transform: scale(0.9);
            opacity: 0.7;
            image-rendering: pixelated;
        }

        .character.active {
            filter: brightness(1) grayscale(0) drop-shadow(4px 6px 0 rgba(0,0,0,0.25));
            transform: scale(1.08);
            opacity: 1;
            z-index: 10;
        }

        /* 對話框 - RPG像素風格 */
        .pixel-dialogue {
            position: absolute;
            bottom: 28px;
            left: 5%;
            width: 90%;
            min-height: 140px;
            background: rgba(252, 251, 235, 0.98);
            border: 5px solid var(--pixel-border);
            box-shadow: 6px 6px 0 rgba(0,0,0,0.2);
            padding: 16px 18px;
            z-index: 20;
            border-radius: 0px;
        }

        /* 名稱標籤 */
        .name-tag {
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: var(--pixel-accent-dark);
            padding: 4px 16px;
            border: 2px solid var(--pixel-border);
            position: absolute;
            top: -22px;
            left: 15px;
            font-family: 'VT323', monospace;
            letter-spacing: 1px;
            box-shadow: 2px 2px 0 var(--pixel-shadow);
        }

        .message {
            font-size: 26px;
            color: var(--pixel-text);
            line-height: 1.25;
            margin-top: 10px;
            word-break: break-word;
            white-space: pre-wrap;
            font-family: 'VT323', monospace;
        }

        /* 下一句箭頭按鈕 (右側) */
        .next-button {
            position: absolute;
            right: 18px;
            bottom: 12px;
            background: none;
            border: none;
            font-size: 34px;
            font-family: monospace;
            color: var(--pixel-accent-dark);
            cursor: pointer;
            animation: bounceArrow 0.5s steps(2) infinite;
            padding: 8px 12px;
            transition: transform 0.05s linear;
            z-index: 25;
        }
        .next-button:active {
            transform: scale(0.9);
            color: #3a6e1f;
        }

        @keyframes bounceArrow {
            0% { transform: translateX(0px); }
            100% { transform: translateX(6px); }
        }

        /* 總結畫面 (完成劇情後顯示) */
        #summary-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(235, 240, 200, 0.97);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 200;
            backdrop-filter: blur(2px);
        }

        .mission-box {
            border: 6px solid var(--pixel-border);
            background: #fffef0;
            padding: 28px 20px;
            width: 85%;
            max-width: 450px;
            text-align: center;
            box-shadow: 10px 10px 0 var(--pixel-shadow);
        }

        .mission-title {
            font-size: 38px;
            color: #c74e2e;
            margin-bottom: 18px;
            font-family: 'VT323', monospace;
            letter-spacing: 2px;
        }

        .mission-text {
            font-size: 24px;
            color: var(--pixel-text);
            line-height: 1.4;
            margin-bottom: 30px;
            font-family: 'VT323', monospace;
        }

        .btn-start {
            font-family: 'VT323', monospace;
            font-size: 32px;
            background: var(--pixel-accent);
            color: #2c3e1f;
            border: 3px solid var(--pixel-border);
            padding: 12px 35px;
            cursor: pointer;
            box-shadow: 5px 5px 0 var(--pixel-border);
            transition: all 0.05s linear;
            font-weight: bold;
        }
        .btn-start:active {
            transform: translate(3px, 3px);
            box-shadow: 2px 2px 0 var(--pixel-border);
        }

        /* 提示按鈕區 */
        .click-hint {
            position: absolute;
            bottom: 16px;
            right: 30px;
            font-size: 16px;
            color: #8b6b3d;
            background: rgba(255,250,210,0.7);
            padding: 4px 10px;
            border-radius: 20px;
            font-family: monospace;
            pointer-events: none;
        }

        /* 手機觸控優化 */
        @media (max-width: 600px) {
            .character {
                width: 42vw;
                max-width: 200px;
            }
            .message {
                font-size: 22px;
            }
            .name-tag {
                font-size: 18px;
                top: -18px;
            }
            .mission-text {
                font-size: 20px;
            }
            .btn-start {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="background-layer"></div>
    <div class="pixel-overlay"></div>

    <!-- 左右角色 -->
    <div class="character-container">
        <img id="runninghorse" class="character" src="跑馬01-bad.png" alt="跑馬" onerror="this.onerror=null; this.src='https://i.postimg.cc/mD8p95Yf/3ktyF11d.jpg';">
        <img id="bookworm" class="character" src="書蟲01-norm.png" alt="書蟲" onerror="this.onerror=null; this.src='https://i.postimg.cc/mD8p95Yf/3ktyF11d.jpg';">
    </div>

    <!-- 對話框區塊 -->
    <div class="pixel-dialogue" id="dialogueBox">
        <div class="name-tag" id="speakerName">跑馬</div>
        <div class="message" id="messageText">覺得跑九分鐘耐力測試好辛苦T^T</div>
        <button class="next-button" id="nextBtn">➔</button>
    </div>

    <!-- 總結畫面（Matching Game 入口） -->
    <div id="summary-screen">
        <div class="mission-box">
            <h1 class="mission-title">📖 MISSION START</h1>
            <p class="mission-text" id="summaryText">
                跑馬覺得跑九分鐘耐力測試好辛苦<br>
                主角書蟲決定：<strong>「哈哈幫佢跑九分鐘」</strong><br><br>
                🏃 現在進入 Matching Game，<br>
                幫跑馬完成挑戰！
            </p>
            <button class="btn-start" id="startGameBtn">▶ ENTER GAME</button>
        </div>
    </div>

    <script>
        // ----- 劇情流程（四段對話）-----
        // 依照要求：跑馬 -> 介紹 -> 書蟲回應 -> 總結畫面(自動總結)
        const storySteps = [
            {
                speaker: "跑馬",
                text: "覺得跑九分鐘耐力測試好辛苦 T^T",
                activeCharacter: "runninghorse",   // 左側跑馬高亮
                showSummary: false
            },
            {
                speaker: "跑馬",
                text: "【介紹】跑馬(Running Horse)\n特徵： 體育課惡夢，跑 9 分鐘耐力賽跑到快崩潰",
                activeCharacter: "runninghorse",
                showSummary: false
            },
            {
                speaker: "主角（書蟲）",
                text: "哈哈幫佢跑九分鐘",
                activeCharacter: "bookworm",       // 右側書蟲高亮
                showSummary: false
            }
        ];

        let currentStepIndex = 0;
        let storyCompleted = false;

        // DOM 元素
        const dialogueBox = document.getElementById('dialogueBox');
        const speakerNameEl = document.getElementById('speakerName');
        const messageTextEl = document.getElementById('messageText');
        const nextBtn = document.getElementById('nextBtn');
        const summaryScreen = document.getElementById('summary-screen');
        const startGameBtn = document.getElementById('startGameBtn');
        
        const runninghorseImg = document.getElementById('runninghorse');
        const bookwormImg = document.getElementById('bookworm');

        // 更新角色高亮 (active class)
        function updateCharacterHighlight(activeId) {
            // 移除所有 active 狀態
            runninghorseImg.classList.remove('active');
            bookwormImg.classList.remove('active');
            
            if (activeId === 'runninghorse') {
                runninghorseImg.classList.add('active');
            } else if (activeId === 'bookworm') {
                bookwormImg.classList.add('active');
            }
        }

        // 刷新對話框內容
        function updateDialogue() {
            if (currentStepIndex < storySteps.length) {
                const step = storySteps[currentStepIndex];
                speakerNameEl.innerText = step.speaker;
                messageTextEl.innerText = step.text;
                updateCharacterHighlight(step.activeCharacter);
            } else {
                // 所有對話結束 -> 顯示總結畫面 (第四步總結)
                showSummary();
            }
        }

        // 顯示總結畫面，並且讓 Matching Game 入口出現
        function showSummary() {
            storyCompleted = true;
            // 隱藏對話框
            dialogueBox.style.display = 'none';
            // 移除角色高亮 (畫面乾淨)
            updateCharacterHighlight(null);
            // 顯示總結畫面
            summaryScreen.style.display = 'flex';
        }

        // 處理下一步 (點擊箭頭或點擊畫面區域)
        function goToNext() {
            if (storyCompleted) return;
            
            if (currentStepIndex < storySteps.length) {
                // 還沒到最後一個對話
                currentStepIndex++;
                if (currentStepIndex < storySteps.length) {
                    // 還有下一句對話
                    updateDialogue();
                } else {
                    // 對話結束 -> 展示總結畫面 (第四步總結)
                    showSummary();
                }
            } else {
                // 理論上不會進來，但安全起見
                showSummary();
            }
        }

        // 進入 Matching Game (跳轉到原本的遊戲頁面)
        function enterMatchingGame() {
            // 根據需求，跳轉到主要的 Matching Game html (study mission 頁面)
            // 這裡跳轉到目前正在運行的主遊戲頁面 (假設檔案名稱為 mission_game.html 或直接替換成目前遊戲)
            // 因為主遊戲在同個目錄下命名為 index_mission.html 或其他，但為符合運作，指定到當前的遊戲頁面 (可改成實際名稱)
            // 此處直接跳轉到 matching game 主畫面 (使用者目前的遊戲頁面，請確保相對路徑正確)
            // 為了彈性，我們指向當前頁面同層的 "matching_game.html" ，但依照對話提供的遊戲主程式，我們可以讓它重新載入遊戲頁面。
            // 由於你原本遊戲在另一個html程式碼，此處我將它連到原本遊戲的html檔案名稱: 假設為 "study_mission.html"
            // 若需要整合在同一個專案，你之後可改成對應檔名。這裡先使用相對路徑 './' 下的遊戲主頁面，你也可以指定。
            window.location.href = 'game.html';   // 請根據實際主遊戲檔案名稱修改，目前預設為 'game.html'
        }

        // 綁定事件: 箭頭按鈕
        nextBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            goToNext();
        });
        
        // 為了方便觸控，點擊對話框區域也可以視為下一句 (但避免按鈕重複觸發)
        dialogueBox.addEventListener('click', (e) => {
            // 如果點擊的是按鈕本身就不要重複觸發
            if (e.target === nextBtn) return;
            goToNext();
        });

        // 開始遊戲按鈕
        startGameBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            enterMatchingGame();
        });

        // 預先設置圖片載入失敗時的替代處理：如果圖片不存在則顯示簡單文字占位，但不影響體驗
        // 同時確保角色默認高亮第一幕 (跑馬)
        function initStory() {
            currentStepIndex = 0;
            storyCompleted = false;
            dialogueBox.style.display = 'block';
            summaryScreen.style.display = 'none';
            updateDialogue();
            
            // 如果圖片加載失敗，至少保留佔位效果
            runninghorseImg.onerror = function() {
                this.style.objectFit = 'contain';
                this.style.backgroundColor = '#cfc5a0';
                this.alt = '跑馬';
            };
            bookwormImg.onerror = function() {
                this.style.objectFit = 'contain';
                this.style.backgroundColor = '#cfc5a0';
                this.alt = '書蟲';
            };
        }
        
        // 啟動劇情
        initStory();
    </script>
</body>
</html>
