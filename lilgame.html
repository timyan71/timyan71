<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>像素跑馬仔 - Pixel Art Edition</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background: #333; font-family: 'Courier New', Courier, monospace; touch-action: none; }
        
        canvas { 
            display: block; 
            background-color: #f7f7f7; 
            background-image: url('background.png'); 
            background-size: cover;
            background-position: center;
            
            /* --- 【關鍵：CSS 像素化處理】 --- */
            image-rendering: pixelated;       /* Chrome/Edge */
            image-rendering: crisp-edges;      /* Firefox */
        }

        #ui, #timer-box { 
            position: absolute; 
            color: #fff; 
            z-index: 10; 
            text-shadow: 2px 2px 0px #000; /* 像素風格常用硬陰影 */
            text-transform: uppercase;
        }
        #ui { top: 20px; left: 20px; font-size: 20px; }
        #timer-box { top: 20px; right: 20px; font-size: 24px; color: #ffeb3b; }

        #msg { 
            position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); 
            text-align: center; z-index: 20; 
            background: #fff; 
            padding: 30px; 
            border: 4px solid #000; /* 硬邊框 */
            width: 80%; max-width: 300px; 
        }
        
        button { 
            padding: 12px 25px; 
            font-size: 18px; 
            cursor: pointer; 
            background: #000; 
            color: #fff; 
            border: none; 
            font-family: inherit;
            box-shadow: 4px 4px 0px #888; /* 像素風按鈕陰影 */
        }
        button:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #888; }
        
        .success { color: #00aa00; font-size: 28px; font-weight: bold; }
        .fail { color: #aa0000; font-size: 28px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">SCORE: <span id="score">0</span></div>
    <div id="timer-box">TIME: <span id="time">30</span>S</div>
    
    <div id="msg">
        <h2 id="status">CHALLENGE!</h2>
        <p id="sub-status">BLUE RUNNING, PINK CLEAR</p>
        <button id="startBtn">LOADING...</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');
    const msgEl = document.getElementById('msg');
    const statusEl = document.getElementById('status');
    const subStatusEl = document.getElementById('sub-status');
    const startBtn = document.getElementById('startBtn');

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // 每次 resize 都要重新設定一次，防止變回平滑
        ctx.imageSmoothingEnabled = false; 
    }
    window.addEventListener('resize', resize);
    resize();

    const imgPink = new Image();
    imgPink.src = 'dino_pink_idle.png';
    const imgBlue = new Image();
    imgBlue.src = 'dino_blue_running.png';
    const imgCactus = new Image();
    imgCactus.src = 'cactus.png';

    let pinkLoaded = false, blueLoaded = false, cactusLoaded = false;
    imgPink.onload = () => { pinkLoaded = true; checkReady(); };
    imgBlue.onload = () => { blueLoaded = true; checkReady(); };
    imgCactus.onload = () => { cactusLoaded = true; checkReady(); };
    setTimeout(checkReady, 2000); 

    function checkReady() { startBtn.innerText = "START GAME"; }

    let gameRunning = false;
    let score = 0;
    let timeLeft = 60;
    let tiltY = 0; 
    let frame = 0;
    let obstacles = [];
    let dino = { x: 50, y: 200, w: 80, h: 80 }; 
    let dinoState = 'pink';
    let timerInterval;

function handleOrientation(event) {
        let beta = event.beta; 
        if (beta === null) return;
        tiltY = (beta - 45) * 0.7; 
    }
    
    function drawDino() {
        // --- 【關鍵：JS 繪製像素化處理】 ---
        ctx.imageSmoothingEnabled = false; 
        
        if (dinoState === 'blue' && blueLoaded) {
            ctx.drawImage(imgBlue, dino.x, dino.y, dino.w, dino.h);
        } else if (dinoState === 'pink' && pinkLoaded) {
            ctx.drawImage(imgPink, dino.x, dino.y, dino.w, dino.h);
        } else {
            ctx.fillStyle = (dinoState === 'blue') ? '#0000ff' : '#ff00ff';
            ctx.fillRect(dino.x, dino.y, dino.w, dino.h);
        }
    }

    function init() {
        gameRunning = true;
        dinoState = 'blue';
        score = 0;
        timeLeft = 30;
        obstacles = [];
        frame = 0;
        dino.y = canvas.height / 2;
        scoreEl.innerText = "0";
        timeEl.innerText = "30";
        msgEl.style.display = 'none';
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            timeEl.innerText = timeLeft;
            if (timeLeft <= 0) winGame();
        }, 1000);
        animate();
    }

    function animate() {
        if (!gameRunning) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 畫邊界 (像素風建議用實色)
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(0, 0, canvas.width, 8);
        ctx.fillRect(0, canvas.height - 8, canvas.width, 8);

        dino.y += tiltY;
        if (dino.y <= 8 || (dino.y + dino.h) >= canvas.height - 8) {
            gameOver("OUT OF BOUNDS!"); return;
        }

        drawDino();

        if (frame % 70 === 0) {
            obstacles.push({ x: canvas.width, y: 50 + Math.random()*(canvas.height-150), w: 70, h: 100, passed: false });
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.x -= (6 + (score / 400));
            
            ctx.imageSmoothingEnabled = false;
            if (cactusLoaded) {
                ctx.drawImage(imgCactus, o.x, o.y, o.w, o.h);
            } else {
                ctx.fillStyle = '#555'; 
                ctx.fillRect(o.x, o.y, o.w, o.h);
            }

            if (dino.x < o.x + o.w && dino.x + dino.w > o.x && dino.y < o.y + o.h && dino.y + dino.h > o.y) {
                gameOver("GAME OVER!"); return;
            }

            if (o.x + o.w < dino.x && !o.passed) {
                score += 10; o.passed = true; scoreEl.innerText = score;
            }
            if (o.x < -o.w) obstacles.splice(i, 1);
        }

        frame++;
        requestAnimationFrame(animate);
    }

    function winGame() {
        stopGame();
        dinoState = 'pink';
        statusEl.innerHTML = "<span class='success'>MISSION CLEAR!</span>";
        subStatusEl.innerText = "YOU SURVIVED 30 SECS!";
        updateFinalFrame();
    }

    function gameOver(reason) {
        stopGame();
        dinoState = 'blue';
        statusEl.innerHTML = "<span class='fail'>CRASHED!</span>";
        subStatusEl.innerText = reason;
        updateFinalFrame();
    }

    function stopGame() {
        gameRunning = false;
        clearInterval(timerInterval);
        window.removeEventListener('deviceorientation', handleOrientation);
    }

    function updateFinalFrame() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#ff0000';
        ctx.fillRect(0, 0, canvas.width, 8);
        ctx.fillRect(0, canvas.height - 8, canvas.width, 8);
        drawDino(); 
        obstacles.forEach(o => {
            ctx.imageSmoothingEnabled = false;
            if (cactusLoaded) ctx.drawImage(imgCactus, o.x, o.y, o.w, o.h);
        });
        msgEl.style.display = 'block';
        startBtn.innerText = "TRY AGAIN";
    }

    startBtn.onclick = () => {
        if (typeof DeviceOrientationEvent.requestPermission === 'function') {
            DeviceOrientationEvent.requestPermission().then(state => {
                if (state === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation);
                    init();
                }
            });
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
            init();
        }
    };
</script>
</body>
</html>
